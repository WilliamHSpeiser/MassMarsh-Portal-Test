<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MassMarsh Remote Sensing Portal</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YEX1HRQN48"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YEX1HRQN48');
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { height: 100vh; }
    iframe { width: 100%; height: 100%; border: none; }

    /* Overlay */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }
    #overlay.hidden { display: none; }

    /* Popup card */
    .popup {
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem 2rem 2rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .popup h2 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .popup h2 .brand { color: #881c1c; }
    .popup h2 .subtitle {
      color: #1a1a1a;
      font-weight: 400;
      font-style: italic;
    }
    .popup p {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .popup p a {
      color: #881c1c;
      text-decoration: underline;
      cursor: pointer;
    }
    .popup p a:hover { color: #6a1515; }
    .popup button {
      background: #881c1c;
      color: #fff;
      border: none;
      padding: 0.7rem 2.5rem;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .popup button:hover { background: #6a1515; }

    .popup label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #777;
      cursor: pointer;
      user-select: none;
    }
    .popup label input { cursor: pointer; }
  </style>
</head>
<body>

  <!-- Overlay -->
  <div id="overlay">
    <div class="popup">
      <h2><span class="brand">MassMarsh:</span> <span class="subtitle">Remote Sensing Portal</span></h2>
      <p>Welcome to the MassMarsh Remote Sensing Portal! <a href="#" id="demoLink">Click here</a> to view our demo video or click continue to proceed to the viewer. You can revisit the demo video by following the link at the bottom of the portal at any time.</p>
      <button id="continueBtn">Continue</button>
      <label>
        <input type="checkbox" id="dismissCheck" />
        Do not show again for 7 days
      </label>
    </div>
  </div>

  <iframe src="https://massmarsh.projects.earthengine.app/view/portaldebugger"></iframe>

  <script>
    (function () {
      var STORAGE_KEY = 'massmarsh_overlay_dismissed';
      var SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;

      var overlay  = document.getElementById('overlay');
      var btn      = document.getElementById('continueBtn');
      var checkbox = document.getElementById('dismissCheck');

      // Check if previously dismissed within the last 7 days
      try {
        var dismissed = localStorage.getItem(STORAGE_KEY);
        if (dismissed && (Date.now() - Number(dismissed)) < SEVEN_DAYS) {
          overlay.classList.add('hidden');
        }
      } catch (e) { /* localStorage unavailable — always show */ }

      btn.addEventListener('click', function () {
        // If checkbox is checked, remember the dismissal
        if (checkbox.checked) {
          try { localStorage.setItem(STORAGE_KEY, Date.now()); } catch (e) {}
        }
        overlay.classList.add('hidden');
      });
    })();
  </script>

</body>
</html>
